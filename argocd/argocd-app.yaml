apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vectro
  namespace: argocd              # ArgoCD always lives in the argocd namespace
  finalizers:
    - resources-finalizer.argocd.argoproj.io   # clean up K8s resources on app delete
spec:
  project: default

  # ── Source — GitHub repository ────────────────────────────────────────────
  source:
    repoURL: https://github.com/kampatra/vectro   # public GitHub repo
    targetRevision: main                          # branch to track
    path: k8s                                     # folder containing the manifests

  # ── Destination — EKS cluster ─────────────────────────────────────────────
  destination:
    server: https://kubernetes.default.svc        # in-cluster (ArgoCD is in same cluster)
    namespace: vectro

  # ── Sync Policy ───────────────────────────────────────────────────────────
  syncPolicy:
    automated:
      prune: true        # delete resources removed from Git
      selfHeal: true     # revert manual changes made outside ArgoCD
    syncOptions:
      - CreateNamespace=true        # auto-create vectro namespace if missing
      - ApplyOutOfSyncOnly=true     # only apply changed resources
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 1m

  # ── Ignore differences for the CSI-synced Secret ──────────────────────────
  # vectro-cognito-secret is created and managed by the Secrets Store CSI
  # driver at runtime. ArgoCD should not attempt to manage or diff its data.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: vectro-cognito-secret
      namespace: vectro
      jsonPointers:
        - /data
