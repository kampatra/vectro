spring:
  application:
    name: cognito-auth-microservice
  security:
    oauth2:
      resourceserver:
        jwt:
          # Cognito JWKS endpoint – Spring validates incoming Bearer tokens automatically
          issuer-uri: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_tQhHxC9IH
          jwk-set-uri: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_tQhHxC9IH/.well-known/jwks.json

server:
  port: 8080

# ─────────────────────────────────────────────────────────────────────────────
# AWS Cognito Configuration
# Replace the placeholder values below with your actual Cognito App Client
# details from the AWS Console → Cognito → User Pools → us-east-1_tQhHxC9IH
#   → App Clients
# ─────────────────────────────────────────────────────────────────────────────
aws:
  region: us-east-1
  cognito:
    user-pool-id: us-east-1_T6dPgrH15
    # ▼ REQUIRED: paste your App Client ID here
    client-id: dummy
    # ▼ OPTIONAL: only needed if your App Client has a secret enabled
    client-secret: dummy
  credentials:
    # ▼ REQUIRED: AWS IAM credentials with cognito-idp:* permissions
    access-key: dummy
    secret-key: dummy

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.example.auth: DEBUG
    org.springframework.security: INFO
    software.amazon.awssdk: WARN
