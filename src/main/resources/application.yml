spring:
  application:
    name: cognito-auth-microservice
  security:
    oauth2:
      resourceserver:
        jwt:
          # Cognito JWKS endpoint – Spring validates incoming Bearer tokens automatically.
          # Overridden at runtime via env vars injected from the ConfigMap.
          issuer-uri: ${COGNITO_ISSUER_URI}
          jwk-set-uri: ${COGNITO_JWKS_URI}

server:
  port: ${SERVER_PORT:8080}

# ─────────────────────────────────────────────────────────────────────────────
# AWS / Cognito Configuration
#
# Non-sensitive values are provided via the ConfigMap (env vars injected at
# pod startup). Sensitive values (client-secret) come from AWS Secrets Manager
# via the Secrets Store CSI driver – mounted as env var COGNITO_CLIENT_SECRET.
#
# IAM credentials are NOT configured here. The AWS SDK resolves them
# automatically through the DefaultCredentialsProvider chain:
#   - IRSA / EKS Pod Identity in production
#   - ~/.aws/credentials or env vars for local development
# ─────────────────────────────────────────────────────────────────────────────
aws:
  region: ${AWS_REGION:us-east-1}
  cognito:
    user-pool-id: ${AWS_COGNITO_USER_POOL_ID}
    client-id: ${AWS_COGNITO_CLIENT_ID}
    # Injected at runtime from AWS Secrets Manager via Secrets Store CSI driver.
    # Falls back to empty string so the app starts without a secret for clients
    # that do not have a client secret configured.
    client-secret: ${COGNITO_CLIENT_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.example.auth: ${LOGGING_LEVEL_APP:DEBUG}
    org.springframework.security: INFO
    software.amazon.awssdk: WARN
