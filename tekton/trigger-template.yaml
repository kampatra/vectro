apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: vectro-trigger-template
  namespace: tekton-builds
spec:
  params:
    - name: git-url
    - name: git-revision
    - name: git-short-sha

  resourcetemplates:
    # Create a fresh PVC for each PipelineRun so builds are isolated
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: vectro-workspace-$(uid)
        namespace: tekton-builds
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
        storageClassName: gp2

    # Create the PipelineRun that triggers the full CI pipeline
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        name: vectro-run-$(uid)
        namespace: tekton-builds
        labels:
          tekton.dev/pipeline: vectro-ci-pipeline
      spec:
        serviceAccountName: tekton-sa
        podTemplate:
          securityContext:
            fsGroup: 65532
            runAsUser: 0
        pipelineRef:
          name: vectro-ci-pipeline
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: $(tt.params.git-revision)
          - name: git-short-sha
            value: $(tt.params.git-short-sha)
        workspaces:
          - name: shared-workspace
            persistentVolumeClaim:
              claimName: vectro-workspace-$(uid)
        # Timeout for the entire pipeline run
        timeouts:
          pipeline: "30m"
