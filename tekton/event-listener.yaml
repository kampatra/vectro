apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: vectro-event-listener
  namespace: tekton-builds
spec:
  serviceAccountName: tekton-sa
  resources:
    kubernetesResource:
      serviceType: LoadBalancer
      servicePort: 8080
  triggers:
    - name: github-push-trigger
      interceptors:
        # Validate the GitHub webhook signature (HMAC-SHA256)
        - ref:
            name: github
          params:
            - name: secretRef
              value:
                secretName: github-webhook-secret
                secretKey: secret
            - name: eventTypes
              value:
                - push

        # Filter: only trigger on pushes to the main branch
        - ref:
            name: cel
          params:
            - name: filter
              value: "body.ref == 'refs/heads/main'"

      bindings:
        - ref: vectro-trigger-binding

      template:
        ref: vectro-trigger-template
