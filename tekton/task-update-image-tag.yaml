apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: update-image-tag
  namespace: tekton-builds
spec:
  params:
    - name: GIT_REVISION
      description: Short git SHA (7 chars) to set as the new image tag in deployment.yaml
      type: string
    - name: GITHUB_TOKEN_SECRET
      description: Name of the Kubernetes Secret containing the GitHub PAT
      default: github-token
  workspaces:
    - name: source
      description: Cloned repo workspace
  steps:
    - name: patch-and-push
      image: bitnami/git:latest
      workingDir: $(workspaces.source.path)
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.GITHUB_TOKEN_SECRET)
              key: token
        - name: NEW_TAG
          value: $(params.GIT_REVISION)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        ECR_URI="768517706273.dkr.ecr.us-east-1.amazonaws.com/ibm/vetro"

        echo "=== Configuring git identity ==="
        git config user.email "tekton-bot@vectro.ci"
        git config user.name "Tekton Bot"

        echo "=== Patching k8s/deployment.yaml with tag: ${NEW_TAG} ==="
        # Replace any existing tag after the ECR repo URI
        sed -i "s|${ECR_URI}:.*|${ECR_URI}:${NEW_TAG}|g" k8s/deployment.yaml

        echo "=== Verifying change ==="
        grep "image:" k8s/deployment.yaml

        echo "=== Committing and pushing ==="
        git add k8s/deployment.yaml
        git commit -m "chore: update image tag to ${NEW_TAG} [skip ci]"
        git push https://x-access-token:${GITHUB_TOKEN}@github.com/kampatra/vectro.git HEAD:main

        echo "=== Image tag update pushed to GitHub successfully ==="
