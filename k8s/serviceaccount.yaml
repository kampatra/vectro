# ─────────────────────────────────────────────────────────────────────────────
# ServiceAccount for the vectro pod.
#
# The eks.amazonaws.com/role-arn annotation wires IRSA (IAM Roles for Service
# Accounts). The AWS SDK DefaultCredentialsProvider in the application will
# automatically obtain short-lived credentials from this role — no static
# access keys required.
#
# Required IAM permissions on the role:
#   - cognito-idp:InitiateAuth
#   - cognito-idp:GetUser
#   - cognito-idp:AdminGetUser
#   - secretsmanager:GetSecretValue  (for the Secrets Store CSI driver)
#
# Replace ACCOUNT_ID and ROLE_NAME with your actual values, or set the
# annotation after creating the role:
#   kubectl annotate serviceaccount vectro-sa \
#     -n vectro \
#     eks.amazonaws.com/role-arn=arn:aws:iam::208073622683:role/vectro-irsa-role
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vectro-sa
  namespace: vectro
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::768517706273:role/vectro-irsa-role
