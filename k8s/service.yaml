apiVersion: v1
kind: Service
metadata:
  name: vectro-svc
  namespace: vectro
  labels:
    app: vectro
spec:
  # ClusterIP exposes the pod internally.
  # The ALB Ingress controller routes external traffic to this service.
  type: ClusterIP
  selector:
    app: vectro
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
