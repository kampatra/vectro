apiVersion: apps/v1
kind: Deployment
metadata:
  name: vectro
  namespace: vectro
  labels:
    app: vectro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vectro
  template:
    metadata:
      labels:
        app: vectro
    spec:
      # ── Service Account – annotated with the IAM role ARN for IRSA ─────────
      # The AWS SDK (DefaultCredentialsProvider) will pick up credentials from
      # the IRSA token automatically. No static keys needed.
      serviceAccountName: vectro-sa

      containers:
        - name: vectro
          image: 768517706273.dkr.ecr.us-east-1.amazonaws.com/ibm/vetro:2bead78
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP

          # ── Resource limits ────────────────────────────────────────────────
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # ── Non-sensitive config from ConfigMap ────────────────────────────
          envFrom:
            - configMapRef:
                name: vectro-config

          # ── Spring JWT config overrides from ConfigMap ─────────────────────
          env:
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: vectro-config
                  key: COGNITO_ISSUER_URI
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              valueFrom:
                configMapKeyRef:
                  name: vectro-config
                  key: COGNITO_JWKS_URI
            - name: AWS_COGNITO_USER_POOL_ID
              valueFrom:
                configMapKeyRef:
                  name: vectro-config
                  key: COGNITO_USER_POOL_ID
            - name: AWS_COGNITO_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: vectro-config
                  key: COGNITO_CLIENT_ID

            # ── Sensitive value from AWS Secrets Manager (CSI-mounted) ───────
            # The Secrets Store CSI driver writes the secret to a volume file AND
            # can sync it to an env var via the secretObjects block in
            # SecretProviderClass (see secret-provider-class.yaml).
            - name: COGNITO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vectro-cognito-secret   # synced K8s Secret from SecretProviderClass
                  key: cognito_client_secret

          # ── Mount the CSI secret volume so the sync happens ────────────────
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true

          # ── Health checks via Spring Actuator ─────────────────────────────
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

      # ── CSI secret volume – reads from AWS Secrets Manager ─────────────────
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: vectro-secret-provider

      terminationGracePeriodSeconds: 30
