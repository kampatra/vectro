# ─────────────────────────────────────────────────────────────────────────────
# SecretProviderClass – AWS Secrets Manager integration
#
# Prerequisites (one-time cluster setup):
#   1. Install the Secrets Store CSI driver:
#        helm repo add secrets-store-csi-driver \
#          https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
#        helm install csi-secrets-store secrets-store-csi-driver/secrets-store-csi-driver \
#          --namespace kube-system --set syncSecret.enabled=true
#
#   2. Install the AWS provider:
#        kubectl apply -f \
#          https://raw.githubusercontent.com/aws/secrets-store-csi-driver-provider-aws/main/deployment/aws-provider-installer.yaml
#
#   3. Create the secret in AWS Secrets Manager (one-time):
#        aws secretsmanager create-secret \
#          --name verto/vectro/cognito \
#          --secret-string '{"cognito_client_secret":"<YOUR_SECRET>"}'
#
#   4. Annotate the vectro-sa ServiceAccount with the IAM role that has
#      secretsmanager:GetSecretValue permission on the secret above.
#      See serviceaccount.yaml.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: vectro-secret-provider
  namespace: vectro
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "verto/vectro/cognito"
        objectType: "secretsmanager"
        jmesPath:
          - path: cognito_client_secret
            objectAlias: cognito_client_secret

  # Sync the secret value into a native K8s Secret so it can be
  # referenced as an env var in the Deployment.
  secretObjects:
    - secretName: vectro-cognito-secret
      type: Opaque
      data:
        - objectName: cognito_client_secret
          key: cognito_client_secret
