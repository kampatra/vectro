apiVersion: v1
kind: Secret
metadata:
  name: vectro-secrets
  namespace: vectro
type: Opaque
# ─────────────────────────────────────────────────────────────────────────────
# DO NOT store real values here. This file is committed to Git.
# Apply the real secret manually ONCE before ArgoCD sync:
#
#   kubectl create secret generic vectro-secrets -n vectro \
#     --from-literal=AWS_ACCESS_KEY_ID=<YOUR_KEY> \
#     --from-literal=AWS_SECRET_ACCESS_KEY=<YOUR_SECRET> \
#     --from-literal=COGNITO_CLIENT_SECRET=<YOUR_COGNITO_SECRET> \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# ArgoCD is configured to ignore this secret during sync (see argocd-app.yaml).
# ─────────────────────────────────────────────────────────────────────────────
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  COGNITO_CLIENT_SECRET: "REPLACE_ME"
